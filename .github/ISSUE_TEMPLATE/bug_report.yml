name: Bug report
description: Report something broken in the Sortie beta.
title: "[Bug]: "
labels: ["bug", "beta"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Sortie. The most useful reports separate install, pairing, message delivery, and agent runtime behavior.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: One or two sentences describing the bug.
      placeholder: "Example: The iPhone app linked successfully, but new Codex sessions never appeared."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact actions that triggered the issue.
      placeholder: |
        1. Run `sortie`
        2. Scan the QR code
        3. Start a Codex session
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should Sortie have done instead?"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: sortie doctor output
      description: Run `sortie doctor` and paste the output here. Remove secrets or tokens if any appear.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Where did it happen?
      options:
        - Install or update
        - QR pairing
        - iOS app
        - Mac CLI or daemon
        - Agent session startup
        - Message delivery
        - Permissions
        - Other
    validations:
      required: true
  - type: input
    id: ios
    attributes:
      label: iOS version
      placeholder: "Example: iOS 18.5"
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "Example: macOS 15.5"
  - type: input
    id: agent
    attributes:
      label: Agent CLI involved
      placeholder: "Example: claude, codex, gemini, amp"
  - type: textarea
    id: media
    attributes:
      label: Screenshots or logs
      description: Drag in screenshots, screen recordings, or relevant logs.
